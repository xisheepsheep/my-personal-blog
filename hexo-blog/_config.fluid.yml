favicon: /img/favicon.svg
apple_touch_icon: /img/favicon.svg
tab_title_separator: " | "

dark_mode:
  enable: true
  default: auto

navbar:
  blog_title: "Alex"
  ground_glass:
    enable: true
    px: 4
    alpha: 0.7
  menu:
    - { key: "首页", link: "/", icon: "iconfont icon-home-fill" }
    - { key: "归档", link: "/archives/", icon: "iconfont icon-archive-fill" }
    - { key: "分类", link: "/categories/", icon: "iconfont icon-category-fill" }
    - { key: "标签", link: "/tags/", icon: "iconfont icon-tags-fill" }
    - { key: "模板", link: "/themes/", icon: "iconfont icon-brush" }
    - { key: "项目", link: "/projects/", icon: "iconfont icon-code" }
    - { key: "关于", link: "/about/", icon: "iconfont icon-user-fill" }

search:
  enable: true
  path: /local-search.xml
  generate_path: /local-search.xml
  field: post
  content: true

index:
  banner_img: "https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=1800&auto=format&fit=crop"
  banner_img_height: 88
  banner_mask_alpha: 0.45
  slogan:
    enable: true
    text:
      - "记录技术、学习、项目和生活思考"
      - "把复杂问题写清楚，把长期成长留下来"

post:
  banner_img: "https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=1800&auto=format&fit=crop"
  banner_img_height: 55
  banner_mask_alpha: 0.45
  default_index_img: "https://images.unsplash.com/photo-1499750310107-5fef28a66643?q=80&w=1200&auto=format&fit=crop"
  meta:
    author:
      enable: true
    date:
      enable: true
    wordcount:
      enable: true
    min2read:
      enable: true
  toc:
    enable: true
    headingSelector: h1,h2,h3,h4
    collapseDepth: 0
  copyright:
    enable: true
    author:
      enable: true
    url:
      enable: true

archive:
  banner_img: "https://images.unsplash.com/photo-1483058712412-4245e9b90334?q=80&w=1800&auto=format&fit=crop"
  banner_img_height: 50

category:
  enable: true
  banner_img: "https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=1800&auto=format&fit=crop"
  banner_img_height: 50

tag:
  enable: true
  banner_img: "https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1800&auto=format&fit=crop"
  banner_img_height: 50

about:
  enable: true
  banner_img: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?q=80&w=1800&auto=format&fit=crop"
  banner_img_height: 50
  avatar: /img/avatar.svg
  name: "Alex"
  intro: "全栈工程师，关注现代 Web、产品工程和长期学习。"
  icons:
    - { class: "iconfont icon-github-fill", link: "https://github.com/xisheepsheep", tip: "GitHub" }
    - { class: "iconfont icon-mail", link: "mailto:1227992477@qq.com", tip: "Email" }

code:
  copy_btn: true
  language:
    enable: true
    default: "TEXT"
  highlight:
    enable: true
    line_number: true
    lib: "highlightjs"
    highlightjs:
      style: "github gist"
      style_dark: "atom-one-dark"

footer:
  content: "© 2026 Alex · Powered by Hexo + Fluid"
